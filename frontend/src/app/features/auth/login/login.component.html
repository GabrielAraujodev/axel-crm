<div class="login-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-icon mat-card-avatar class="login-avatar">hub</mat-icon>
      <mat-card-title>AXEL CRM</mat-card-title>
      <mat-card-subtitle>Faça login na sua conta</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuário / Email</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          <mat-icon matPrefix>person</mat-icon>
          @if (form.get('username')?.hasError('required') && form.get('username')?.touched) {
            <mat-error>Campo obrigatório</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input
            matInput
            formControlName="password"
            [type]="hidePassword ? 'password' : 'text'"
            autocomplete="current-password"
          />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          @if (form.get('password')?.hasError('required') && form.get('password')?.touched) {
            <mat-error>Senha é obrigatória</mat-error>
          }
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width submit-btn"
          [disabled]="loading"
        >
          @if (loading) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Entrar
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions align="end">
      <a mat-button routerLink="/register" color="accent">Criar conta</a>
    </mat-card-actions>
  </mat-card>
</div>
