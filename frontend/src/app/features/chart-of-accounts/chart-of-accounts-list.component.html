<div class="chart-container">
  <!-- Header -->
  <div class="header-section">
    <div class="title-area">
      <h1>Plano de Contas</h1>
      <p>Gerenciamento da estrutura e classificação contábil da organização</p>
    </div>
    <div class="action-area">
      <input type="file" #fileInput accept=".csv" style="display: none" (change)="onFileSelected($event)" />
      
      <button mat-flat-button color="accent" class="btn-import" (click)="fileInput.click()" [disabled]="uploading">
        <mat-icon>upload_file</mat-icon>
        {{ uploading ? 'Importando...' : 'Importar CSV' }}
      </button>

      <button mat-flat-button color="primary" class="btn-new" (click)="openDialog()">
        <mat-icon>add</mat-icon>
        Nova Conta
      </button>
    </div>
  </div>

  <!-- Table Card -->
  <div class="table-card glass-panel">
    <div *ngIf="loading" class="spinner-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="dataSource" class="accounts-table" *ngIf="!loading">
      <!-- Code Column -->
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef>Código</th>
        <td mat-cell *matCellDef="let element" class="code-cell">{{ element.code }}</td>
      </ng-container>

      <!-- Name Column with dynamic indentation -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome da Conta</th>
        <td mat-cell *matCellDef="let element" [style.padding-left.px]="(element.level - 1) * 24 + 16" class="name-cell">
          <span *ngIf="element.level > 1" class="subaccount-prefix">— </span>
          <span [class.bold-account]="element.level === 1">{{ element.name }}</span>
        </td>
      </ng-container>

      <!-- Type Column -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let element">
          <span class="badge" [ngClass]="element.type.toLowerCase()">{{ element.type }}</span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header">Ações</th>
        <td mat-cell *matCellDef="let element" class="actions-cell">
          <button mat-icon-button color="primary" matTooltip="Editar" (click)="openDialog(element)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Excluir" (click)="onDelete(element)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.root-row]="row.level === 1"></tr>
    </table>

    <div *ngIf="!loading && dataSource.length === 0" class="no-data-placeholder">
      <mat-icon>account_balance</mat-icon>
      <p>Nenhuma conta contábil cadastrada. Importe um arquivo CSV ou crie manualmente.</p>
    </div>
  </div>
</div>
